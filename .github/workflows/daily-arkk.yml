name: Daily ARKK Holdings Download

on:
  schedule:
    - cron: '0 12 * * *'   # 20:00 HKT
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}   # Important for push permissions
    
    - name: Set up Python 3.11.5
      uses: actions/setup-python@v5   # This already supports Node 24
      with:
        python-version: '3.11.5'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Cache Playwright Browsers
      uses: actions/cache@v4
      id: playwright-cache
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ hashFiles('requirements.txt') }}
    
    - name: Install Playwright Chromium
      if: steps.playwright-cache.outputs.cache-hit != 'true'
      run: playwright install --with-deps chromium
    
    - name: Install Playwright System Dependencies
      run: playwright install-deps chromium
    
    - name: Run dl_arkk.py
      run: python dl_arkk.py
    
    - name: Commit and push updated files
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add "*.csv" "**/*.csv"
        git commit -m "Daily ARKK update: $(date -u)" || echo "No changes to commit"
        git push